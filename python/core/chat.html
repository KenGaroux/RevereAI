<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reverie — DeathAI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0d0d1a;
            color: #e0e0e0;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            padding: 16px 24px;
            background: #1a1a2e;
            border-bottom: 2px solid #e94560;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        header h1 { font-size: 20px; color: #e94560; }
        header span { font-size: 13px; color: #888; }
        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.6;
            font-size: 15px;
        }
        .user {
            align-self: flex-end;
            background: #e94560;
            color: white;
            border-bottom-right-radius: 2px;
        }
        .reve {
            align-self: flex-start;
            background: #1a1a2e;
            color: #e0e0e0;
            border: 1px solid #333;
            border-bottom-left-radius: 2px;
        }
        .reve .name {
            font-size: 11px;
            color: #e94560;
            margin-bottom: 6px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .thinking {
            align-self: flex-start;
            color: #555;
            font-style: italic;
            font-size: 13px;
            padding: 8px 16px;
        }
        #input-area {
            padding: 16px 24px;
            background: #1a1a2e;
            border-top: 1px solid #333;
            display: flex;
            gap: 12px;
        }
        #input {
            flex: 1;
            background: #0d0d1a;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 12px 16px;
            color: #e0e0e0;
            font-size: 15px;
            outline: none;
            resize: none;
            height: 48px;
            font-family: inherit;
        }
        #input:focus { border-color: #e94560; }
        #send {
            background: #e94560;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 0 24px;
            font-size: 15px;
            cursor: pointer;
            font-family: inherit;
        }
        #send:hover { background: #c73652; }
        #send:disabled { background: #444; cursor: not-allowed; }
        #reset-btn {
            background: transparent;
            border: 1px solid #333;
            color: #888;
            border-radius: 8px;
            padding: 0 16px;
            font-size: 13px;
            cursor: pointer;
        }
        #reset-btn:hover { border-color: #e94560; color: #e94560; }
    </style>
</head>
<body>
    <header>
        <h1>Reverie</h1>
        <span>DeathAI — Built by Daniel Newton</span>
    </header>
    <div id="chat"></div>
    <div id="input-area">
        <textarea id="input" placeholder="Talk to Reve..."></textarea>
        <button id="reset-btn" onclick="resetMemory()">Reset</button>
        <button id="send" onclick="sendMessage()">Send</button>
    </div>

    <script>
        const API = 'http://10.1.1.129:5000';
        const chat = document.getElementById('chat');
        const input = document.getElementById('input');
        const sendBtn = document.getElementById('send');

        input.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        function addMessage(text, role) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            if (role === 'reve') {
                div.innerHTML = `<div class="name">REVE</div>${text}`;
            } else {
                div.textContent = text;
            }
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function addThinking() {
            const div = document.createElement('div');
            div.className = 'thinking';
            div.id = 'thinking';
            div.textContent = 'Reve is thinking...';
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function removeThinking() {
            const t = document.getElementById('thinking');
            if (t) t.remove();
        }

        async function sendMessage() {
            const text = input.value.trim();
            if (!text) return;
            input.value = '';
            sendBtn.disabled = true;
            addMessage(text, 'user');
            addThinking();
            try {
                const res = await fetch(`${API}/ask`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: text })
                });
                const data = await res.json();
                removeThinking();
                addMessage(data.reply, 'reve');
            } catch (err) {
                removeThinking();
                addMessage('Reve is unreachable. Is the API running?', 'reve');
            }
            sendBtn.disabled = false;
            input.focus();
        }

        async function resetMemory() {
            await fetch(`${API}/reset`, { method: 'POST' });
            chat.innerHTML = '';
            addMessage('Memory cleared. Fresh start.', 'reve');
        }

        // Welcome message
        addMessage('Hey. I\'m Reve. What\'s on your mind?', 'reve');
    </script>
</body>
</html>
